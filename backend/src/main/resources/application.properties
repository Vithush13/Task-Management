spring.application.name=backend

# =====================================================
# MySQL Database Configuration
# =====================================================

# Basic Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/task_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Vithush1312+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / Hibernate Settings
# =====================================================

# DDL Auto (create, update, validate, none)
# - create: drops and creates tables at startup
# - update: updates schema without deleting data
# - validate: validates schema, doesn't make changes
# - none: no automatic schema management
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (development only)
spring.jpa.show-sql=true

# Format SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# Set database dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================================
# Connection Pool Configuration (HikariCP)
# =====================================================

# Maximum number of connections
spring.datasource.hikari.maximum-pool-size=10

# Minimum idle connections
spring.datasource.hikari.minimum-idle=5

# Connection timeout in milliseconds
spring.datasource.hikari.connection-timeout=30000

# Maximum lifetime of connection in milliseconds
spring.datasource.hikari.max-lifetime=1800000

# Idle timeout
spring.datasource.hikari.idle-timeout=600000

# =====================================================
# JWT Configuration - ADD THESE LINES!
# =====================================================

# JWT Secret Key - Must be at least 32 characters long
jwt.secret=mySecretKeyForJWTGenerationWithAtLeast32CharactersLong2024

# JWT Token Expiration (24 hours in milliseconds)
jwt.expiration=86400000

# =====================================================
# Logging Configuration
# =====================================================

# Application logging
logging.level.com.taskmanagement=DEBUG

# Security logging
logging.level.org.springframework.security=DEBUG

# SQL logging (optional - comment out in production)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE